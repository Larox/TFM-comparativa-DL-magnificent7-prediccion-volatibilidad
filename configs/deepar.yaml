# DeepAR (Salinas et al., 2020) — defaults aligned with Lim et al. 2021 baseline.
target: "log_rv"        # log(rv); transform applied by common.py
encoder_length: 60      # business days (~3 months)
prediction_length: 21   # covers horizons 1, 5, 21
hidden_size: 32
rnn_layers: 2
dropout: 0.1
batch_size: 128
learning_rate: 0.001
max_epochs: 50
early_stopping_patience: 10
gradient_clip_val: 1.0
optimizer: "Adam"
likelihood: "Normal"    # Gaussian over log(rv)
