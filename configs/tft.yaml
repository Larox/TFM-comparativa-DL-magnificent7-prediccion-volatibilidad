# Temporal Fusion Transformer (Lim et al., 2021) — defaults aligned with their IJF paper.
target: "log_rv"
encoder_length: 60
prediction_length: 21
hidden_size: 64
attention_head_size: 4
hidden_continuous_size: 16
dropout: 0.1
batch_size: 128
learning_rate: 0.001
max_epochs: 50
early_stopping_patience: 10
gradient_clip_val: 1.0
optimizer: "Adam"
quantiles: [0.1, 0.5, 0.9]
